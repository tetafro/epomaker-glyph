name: Push commits
on:
  push:
    branches: [master]
    tags-ignore: ['*']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6
