version: "2"
run:
  concurrency: 2
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - cyclop
    - dogsled
    - durationcheck
    - err113
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - lll
    - misspell
    - nakedret
    - nestif
    - noctx
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace
    - wrapcheck
  exclusions:
    rules:
      - path: (.+)\.go$
        text: do not define dynamic errors, use wrapped static errors instead
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
